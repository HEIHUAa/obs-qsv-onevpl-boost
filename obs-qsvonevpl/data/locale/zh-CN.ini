# AV1 AuxData
AV1CDEF=CDEF 滤波
AV1CDEFDesc=约束方向增强滤波。减少 AV1 编码中边缘周围的振铃伪影，影响视觉质量和压缩效率。
AV1Restoration=环路恢复滤波
AV1RestorationDesc=环路恢复滤波（Wiener/自引导）。恢复丢失的高频细节并减少伪影，以轻微编码开销为代价提升感知质量。
AV1LoopFilter=环路滤波
AV1LoopFilterDesc=去块效应环路滤波控制。减少块边界处的块状伪影。关闭可能提高锐度但会引入可见伪影。
AV1SuperRes=超分辨率
AV1SuperResDesc=AV1 自适应超分辨率。对高细节帧进行降采样再升采样，在低码率下提高编码效率，对流媒体场景有用。
AV1InterpFilter=插值滤波器
AV1InterpFilterDesc=运动补偿插值滤波器类型。控制子像素运动的插值方式。EIGHTTAP_SHARP 保留更多细节，BILINEAR 更快但更柔和。
AV1ErrorResilient=错误弹性模式
AV1ErrorResilientDesc=错误弹性编码模式。在比特流中插入额外同步点以帮助从数据丢失中恢复。对直播有用但可能降低压缩效率。

# VPP MCTF
VPPMCTF=MCTF（运动补偿时域滤波）
VPPMCTFDesc=运动补偿时域滤波。通过分析帧间运动减少时域噪声。对于有运动内容的视频比空间降噪更有效。高强度可能导致运动模糊。
VPPMCTFStrength=MCTF 滤波强度
VPPMCTFStrengthDesc=MCTF 时域滤波强度。范围 0-20。较高值提供更强的降噪效果但可能引入运动模糊。

# Weighted Prediction
WeightedPred=加权预测
WeightedPredDesc=P 帧加权预测。允许对参考样本加权以提高淡入淡出场景的预测效率。对光照变化的内容可改善压缩效果。
WeightedBiPred=双向加权预测
WeightedBiPredDesc=B 帧双向加权预测。将加权预测扩展到双向参考。对淡入淡出过渡和溶解效果有用。

# Adaptive Max Frame Size
AdaptiveMaxFrameSize=最大帧大小 (Kb)
AdaptiveMaxFrameSizeDesc=限制最大编码帧大小（单位 Kb）。0 = 驱动自动选择。设置非零值可防止超大帧导致缓冲下溢。仅部分码率控制模式支持。

# CTU
CTU=CTU 大小
CTUDesc=编码树单元大小。控制编码的最大块大小。较大值（64、128）提高高分辨率内容的压缩效率。较小值（16、32）更适合低分辨率或屏幕内容。AUTO 让 SDK 自动选择。
