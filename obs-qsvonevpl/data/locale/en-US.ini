# AV1 AuxData
AV1CDEF=CDEF Filter
AV1CDEFDesc=Constrained Directional Enhancement Filter. Reduces ringing artifacts around edges in AV1 encoding. Affects visual quality and compression efficiency.
AV1Restoration=Restoration Filter
AV1RestorationDesc=Loop Restoration Filter (Wiener/Self-Guided). Recovers lost high-frequency details and reduces artifacts. Improves perceptual quality at the cost of slight encoding overhead.
AV1LoopFilter=Loop Filter
AV1LoopFilterDesc=Deblocking loop filter control. Reduces blocking artifacts at block boundaries. Disabling may improve sharpness but can introduce visible artifacts.
AV1SuperRes=Super Resolution
AV1SuperResDesc=Adaptive super resolution for AV1. Downscales then upscales high-detail frames to improve coding efficiency at low bitrates. Useful for streaming scenarios.
AV1InterpFilter=Interpolation Filter
AV1InterpFilterDesc=Motion compensation interpolation filter type. Controls how sub-pixel motion is interpolated. EIGHTTAP_SHARP preserves more detail, BILINEAR is faster but softer.
AV1ErrorResilient=Error Resilient Mode
AV1ErrorResilientDesc=Error resilient encoding mode. Inserts additional sync points in the bitstream to aid recovery from data loss. Useful for live streaming but may reduce compression efficiency.

# VPP MCTF
VPPMCTF=MCTF (Motion Compensated Temporal Filtering)
VPPMCTFDesc=Motion Compensated Temporal Filter. Reduces temporal noise by analyzing motion between frames. More effective than spatial denoise for video content with motion. May cause motion blur at high strengths.
VPPMCTFStrength=MCTF Filter Strength
VPPMCTFStrengthDesc=Strength of the MCTF temporal filter. Range 0-20. Higher values provide stronger noise reduction but may introduce motion blur.

# Weighted Prediction
WeightedPred=Weighted Prediction
WeightedPredDesc=Weighted prediction for P-frames. Allows weighting reference samples to improve prediction efficiency for fades and cross-fades. May improve compression for content with lighting changes.
WeightedBiPred=Weighted Biprediction
WeightedBiPredDesc=Weighted bi-prediction for B-frames. Extends weighted prediction to bidirectional references. Useful for fade transitions and dissolve effects.

# Adaptive Max Frame Size
AdaptiveMaxFrameSize=Adaptive Max Frame Size
AdaptiveMaxFrameSizeDesc=Adaptively limits maximum encoded frame size. Prevents oversized frames that could cause buffer underflow. Useful for maintaining stable bitrate in complex scenes.

# CTU
CTU=CTU Size
CTUDesc=Coding Tree Unit size. Controls the maximum block size for encoding. Larger values (64, 128) improve compression efficiency for high-resolution content. Smaller values (16, 32) are better for low-resolution or screen content. AUTO lets the SDK choose.
