10bitUnsupportedAvc="Cannot perform 10-bit encode on Intel QSV H.264 encoder."
NumRefFrame.Tooltip="Max number of all available reference frames (for AVC/HEVC, NumRefFrame defines DPB size). If NumRefFrame = 0, this parameter is not specified."
GOPOptFlag="GOP Status Flag"
GOPOptFlag.Tooltip="CLOSED:\nThe encoder generates closed GOP if this flag is set. Frames in this GOP do not use frames in previous GOP as reference. The encoder generates open GOP if this flag is not set. In this GOP frames prior to the first frame of GOP in display order may use frames from previous GOP as reference. Frames subsequent to the first frame of GOP in display order do not use frames from previous GOP as reference.\nSTRICT:\nThe encoder must strictly follow the given GOP structure as defined by parameter GopPicSize, B-frames etc. Otherwise, the encoder can adapt the GOP structure for better efficiency, whose range is constrained by parameter GopPicSize and B-frames etc."
GlobalMotionBiasAdjustment.Tooltip="Enables global motion bias."
DirectBiasAdjusment.Tooltip="Set this flag to ON to enable the ENC mode decision algorithm to bias to fewer B Direct/Skip types. Applies only to B-frames, all other frames will ignore this setting."
AdaptiveI.Tooltip="Controls insertion of I-frames by the encoder."
AdaptiveB.Tooltip="Controls changing of frame type from B to P."
AdaptiveRef.Tooltip="If this flag is set to ON, encoder adaptively selects list of reference frames to improve encoding quality.\nEnabling of the flag can increase computation complexity and introduce additional delay."
AdaptiveCQM.Tooltip="If this flag is set to ON, encoder adaptively selects one of implementation-defined quantization matrices for each frame. Non-default quantization matrices aim to improve subjective visual quality under certain conditions. Their number and definitions are API implementation specific. If this flag is set to OFF, default quantization matrix is used for all frames."
AdaptiveMaxFrameSize="Adaptive Max Frame Size"
AdaptiveMaxFrameSize.Tooltip="If this flag is set to ON, BRC may decide a larger P- or B-frame size than what MaxFrameSizeP dictates when the scene change is detected. It may benefit the video quality."
ScenarioInfo.ToolTip="Specify the encoding scenario to optimize encoder settings for the intended application."
TransformSkip.ToolTip="Enable or disable transform skip. When enabled, the encoder may skip the transform step for certain blocks to improve compression efficiency."
FadeDetection.ToolTip="Instructs encoder whether internal fade detection algorithm should be used for calculation of weigh/offset values"
Trellis.Tooltip="Controls trellis quantization in the encoder."
LookaheadDepth.Tooltip="Specifies the depth of the look ahead rate control algorithm. The depth value is the number of frames that the encoder analyzes before encoding. Values are in the 10 to 100 range, inclusive."
MVOverpicBoundaries.Tooltip="When set to OFF, no sample outside the picture boundaries and no sample at a fractional sample position for which the sample value is derived using one or more samples outside the picture boundaries is used for inter prediction of any sample.\nWhen set to ON, one or more samples outside picture boundaries may be used in inter prediction."
PreferredMode="Repartition Check Enable"
PreferredMode.Tooltip="Controls AVC encoder attempts to predict from small partitions."
UseRawRef.Tooltip="Set this flag to ON to use raw frames for reference instead of reconstructed frames."
MVCostScalingFactor.Tooltip="0: Set MV cost to be 0.\n1: Scale MV cost to be 1/2 of the default value.\n2: Scale MV cost to be 1/4 of the default value.\n3: Scale MV cost to be 1/8 of the default value."
RDO.Tooltip="Rate distortion optimize"
AsyncDepth.Tooltip="Specifies how many asynchronous operations an application performs before the application explicitly synchronizes the result."
ExtBRC="External BRC"
ExtBRC.Tooltip="Set this option to ON to enable external BRC."
Latency.ToolTip="There is trade-off between latency and quality.\nIf your case prefers on quality, please select 'normal' mode, which may get > 2s end-to-end latency.\nIf your case requires < 500ms end-to-end latency, please select 'ultra-low' mode."
EncTools.Tooltip="Includes additional frame processing steps using the advanced encoder functionality to improve quality. Enctools uses CPU power to process the frame. Enabling it may affect the performance and stability of the encoder"
TuneQuality.Tooltip="Parameter specifies type of quality optimization used by the encoder"
HEVCGPB.Tooltip="Set this parameter to OFF to make HEVC encoder use regular P-frames instead of GPB."
BFramesDesc="Number of B-frames between I- or P (or GPB) key frames; if it is zero, the GOP structure is unspecified. GPB is ON, GPB frames (B without backward references) are used instead of P."
HRDConformanceDesc="If this parameter is turned ON, then encoder produces an HRD conformant bitstream. If it is turned OFF, then the encoder may (but not necessarily) violate HRD conformance."
MBBRCDesc="Setting this parameter enables macroblock level bitrate control that generally improves subjective visual quality. Enabling this flag may have negative impact on performance and objective visual quality metric."
RDODesc="Set this parameter to ON if rate distortion optimization is needed"
AdaptiveIDesc="Controls insertion of I-frames by the encoder. Set this parameter to ON to allow changing of frame type from P and B to I"
AdaptiveBDesc="Controls changing of frame type from B to P. Set this parameter to ON enable changing of frame type from B to P."
AdaptiveRefDesc="If this parameter is set to ON, encoder adaptively selects list of reference frames to improve encoding quality"
AdaptiveLTRDesc="If this parameter is set to ON, encoder will mark, modify, or remove LTR frames based on encoding parameters and content properties"
AdaptiveCQMDesc="If this parameter is set to ON, encoder adaptively selects one of implementation-defined quantization matrices for each frame. Non-default quantization matrices aim to improve subjective visual quality under certain conditions"
PPyramidDesc="When B-frames=0, specifies the model of reference list construction and DPB management"
UseRawRefDesc="Set this parameter to ON to use raw frames for reference instead of reconstructed frames"
GlobalMotionBiasDesc="Enables global motion bias"
DirectBiasDesc="Set this parameter to ON to enable the ENC mode decision algorithm to bias to fewer B Direct/Skip types. Applies only to B-frames, all other frames will ignore this setting."
MVOverpicBoundariesDesc="When set to OFF, no sample outside the picture boundaries and no sample at a fractional sample position for which the sample value is derived using one or more samples outside the picture boundaries is used for inter prediction of any sample. When set to ON, one or more samples outside picture boundaries may be used in inter prediction"
TrellisDesc="Used to control trellis quantization in encoder."
LookaheadDSDesc="Controls down sampling in look ahead bitrate control mode"
VPPDesc="Filters for additional frame processing. Enabling it can have an impact on performance"
LowPowerDesc="Hint to enable low power consumption mode for encoders. Intel Arc graphics adapters only work with the LowPower parameter enabled, changing the state of the parameter will not affect operation. The integrated Intel UHD graphics can work in both modes, the available functionality may vary depending on the state of the parameter."
IntraRefCycleSizeDesc="Specifies number of pictures within refresh cycle starting from 2. 0 and 1 are invalid values."
IntraRefQPDeltaDesc="Specifies QP difference for inserted intra MBs. Signed values are in the -51 to 51 range."
NumRefActivePDesc="How many past encoded frames P-frames can refer to when predicting the current frame. Higher values improve compression but increase GPU load, which may cause frame drops on lower-end GPUs."
NumRefActiveBL0Desc="How many past encoded frames B-frames can refer to (forward prediction). Higher values improve compression but increase GPU load, which may cause frame drops on lower-end GPUs."
NumRefActiveBL1Desc="How many future frames B-frames can refer to (backward prediction). Higher values improve compression but increase GPU load and encoding delay, which may cause frame drops on lower-end GPUs."
ScenarioInfoDesc="Specify the encoding scenario to optimize encoder settings for the intended application."
TransformSkipDesc="Enable or disable transform skip. When enabled, the encoder may skip the transform step for certain blocks to improve compression efficiency."
FadeDetectionDesc="Detect fade scenes and adjust encoding parameters. AUTO lets the encoder decide when to enable fade detection."
BitrateLimitDesc="When enabled, the encoder strictly limits the bitrate to the configured values. When disabled, the encoder may temporarily exceed the target bitrate for better quality in complex scenes."
ContentInfoDesc="Specifies the content type to optimize encoder settings for the specific video content. Proper content type selection can improve compression efficiency."
ExtBRCDesc="Set this parameter to ON to enable external bitrate control. It can have a positive effect on the stability of the bitrate and the quality of the output image"
GPUNumberDesc="Choosing a graphics adapter for multi-GPU systems. The number of the adapter you need may vary depending on the priority set by the system"

ScreenContentTools="Screen Content Tools"
ScreenContentTools.Tooltip="Optimizes encoding for screen content (text, UI elements, scrolling). 'Auto' enables only on supported hardware (Lunar Lake+)."
AUTO_OFF_ON="Auto / Off / On"

TemporalLayers="Temporal Layers"
TemporalLayers.Tooltip="Number of temporal layers (0=OFF, 1-8). Temporal layers enable scalable video coding by creating a layered frame hierarchy. Higher layers can be dropped to reduce bitrate without decoder reset."
TemporalLayers.Desc="Number of temporal layers for hierarchical B-frame structure. 0 disables temporal layering."

